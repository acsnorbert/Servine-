<div class="login-page">

  <div class="container-fluid h-100">
    <div class="row h-100 align-items-center justify-content-center">

      <div class="col-lg-10">

        <div class="login-wrapper row">

          <!-- Bal oldal -->
          <div class="col-md-6 login-card">

            <h1 class="login-title">Login</h1>

            <div class="mt-4">
              <div class="form-floating mb-3">
                <input type="email"  class="form-control w-100 mb-3" id="floatingInput" placeholder="name@example.com" [(ngModel)]="email">
                <label for="floatingInput">Email address</label>
              </div>
              <div class="form-floating">
                <input type="password" class="form-control w-100 mb-3" id="floatingPassword" placeholder="Password" [(ngModel)]="password">
                <label for="floatingPassword">Password</label>
              </div>

              <div class="d-flex justify-content-between small-text">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" [(ngModel)]="remember">
                  <label class="form-check-label" for="flexCheckDefault">
                    Emlékezz rám
                  </label>
                </div>
                

                <a id="forgotpass">Elfelejtettem a jelszavam</a>

              </div>
              <div class="d-flex flex-column">
                <button type="button" class="btn login-btn w-70 mt-4" (click)="login()">Bejelentkezés</button>
                <button type="button" class="btn register-btn w-70 mt-3" [routerLink]="['/registration']"  >Nincs még fiókja? Regisztráljon!</button>
              </div>
             
            </div>

          </div>

          <!-- Jobb oldal -->
          <div class="col-md-6 image-panel">

            
            <img src="ServineLandingpagewoman.png" alt="Perfume Model">

          </div>

        </div>

      </div>

    </div>
  </div>

</div>
