<div class="order-items-page">

  <div class="order-items-header">

    <div>
      <h1>Order Items</h1>
      <span class="subtitle">Manage order products</span>
    </div>

    <div class="actions">

      <input
        pInputText
        type="text"
        placeholder="Search item..."
        [(ngModel)]="search"
      />

      <button pButton label="Add Item" icon="pi pi-plus"></button>

    </div>

  </div>


  <div class="order-items-table">

    <p-table
      [value]="orderItems"
      responsiveLayout="scroll"
      styleClass="items-table"
    >

      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Order ID</th>
          <th>Product ID</th>
          <th>Quantity</th>
          <th>Price</th>
          <th>Total</th>
          <th style="width:150px">Actions</th>
        </tr>
      </ng-template>


      <ng-template pTemplate="body" let-item>
        <tr>

          <td>{{ item.id }}</td>
          <td>{{ item.order_id }}</td>
          <td>{{ item.product_id }}</td>

          <td>
            <span class="qty">
              {{ item.quantity }}
            </span>
          </td>

          <td class="price">
            ${{ item.price }}
          </td>

          <td class="total">
            ${{ item.price * item.quantity }}
          </td>

          <td>

            <button class="edit-btn" (click)="edit(item)">
              Edit
            </button>

            <button class="delete-btn" (click)="delete(item.id)">
              Delete
            </button>

          </td>

        </tr>
      </ng-template>

    </p-table>

  </div>

</div>
