<div class="categories">

  <!-- HEADER -->
  <div class="categories__header">

    <div class="categories__title">
      <span class="section-label">Admin</span>
      <h1>Kategóriák</h1>
    </div>

    <div class="actions">
      <input  pInputText  type="text"  placeholder="Kategória keresése..."  [(ngModel)]="search"/>
      <button class="btn-primary" (click)="add()">
        Kategória hozzáadása
      </button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="categories__table">

    <p-table
      [value]="filteredCategories"
      responsiveLayout="scroll"
      [paginator]="true"
      [rows]="10"
      styleClass="lux-table"
    >

      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Szülő</th>
          <th>Név</th>
          <th>Típus</th>
          <th>Műveletek</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-cat>
        <tr>

          <td class="id">{{ cat.id }}</td>

          <td>
            <span class="parent">
              {{ cat.parent?.name ?? 'Root' }}
            </span>
          </td>

          <td class="name">{{ cat.name }}</td>

          <td>
            <span
              class="badge"
              [ngClass]="{
                'badge--root': !cat.parent_id,
                'badge--child': cat.parent_id
              }"
            >
              {{ cat.parent_id ? 'Alkategória' : 'Fő' }}
            </span>
          </td>

          <td>
            <button class="btn-ghost" (click)="edit(cat)">
              Szerkesztés
            </button>

            <button class="btn-danger" (click)="delete(cat.id,cat.name)">
              Törlés
            </button>
          </td>
        </tr>
      </ng-template>
    </p-table>
    <p-confirmDialog></p-confirmDialog>
  </div>
  <p-dialog
  [(visible)]="displayDialog"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '420px' }"
  styleClass="lux-dialog"
  [header]="isEditMode ? 'Kategória szerkesztése' : 'Kategória hozzáatása'">
    <!-- DIALOG -->
    <div class="dialog-content">
      <!-- NAME-->
      <div class="field">
        <label>Név</label>
        <input type="text" pInputText [(ngModel)]="NewCategory.name"/>
      </div>
       <!-- PARENT -->
      <div class="field">
        <label>Szülő kategória</label>
        <select class="lux-select"[(ngModel)]="NewCategory.parent_id" required>
          <option [ngValue]="null" disabled selected>
            Válasszon szülő kategóriát
          </option>

          <ng-container *ngFor="let cat of categories">
            <option 
              *ngIf="cat.id !== NewCategory.id"
              [ngValue]="cat.id">
              {{ cat.name }}
            </option>
          </ng-container>
        </select>
      </div>
    </div>
    <!-- FOOTER -->
    <ng-template pTemplate="footer">
      <div class="dialog-footer">
        <button  class="btn-ghost" (click)="displayDialog = false"> Mégse</button>
        <button class="btn-primary"(click)="save()"> Mentés</button>
      </div>
    </ng-template>
  </p-dialog>
</div>
