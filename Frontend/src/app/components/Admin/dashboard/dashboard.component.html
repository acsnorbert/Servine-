<div class="dashboard">

  <!-- HEADER -->
  <div class="dashboard__header">
    <div>
      <span class="section-label">Overview</span>
      <h1>Dashboard</h1>
    </div>
  </div>

  <!-- STATS -->
  <div class="dashboard__stats">

    <div class="stat">
      <div class="stat__icon"><i class="pi pi-users"></i></div>
      <div>
        <span class="stat__label">Users</span>
        <span class="stat__value">1,284</span>
      </div>
    </div>

    <div class="stat">
      <div class="stat__icon"><i class="pi pi-shopping-cart"></i></div>
      <div>
        <span class="stat__label">Orders</span>
        <span class="stat__value">324</span>
      </div>
    </div>

    <div class="stat">
      <div class="stat__icon"><i class="pi pi-dollar"></i></div>
      <div>
        <span class="stat__label">Revenue</span>
        <span class="stat__value">$12,540</span>
      </div>
    </div>

    <div class="stat">
      <div class="stat__icon"><i class="pi pi-chart-line"></i></div>
      <div>
        <span class="stat__label">Growth</span>
        <span class="stat__value">+14%</span>
      </div>
    </div>

  </div>

  <!-- MAIN -->
  <div class="dashboard__grid">

    <!-- CHART -->
    <div class="card">
      <div class="card__header">Revenue Overview</div>

      <p-chart
        type="line"
        [data]="chartData"
        [options]="chartOptions"
        height="300">
      </p-chart>
    </div>

    <!-- ACTIVITY -->
    <div class="card">
      <div class="card__header">Recent Activity</div>

      <ul class="activity">
        <li><span></span>New user registered</li>
        <li><span></span>Order #3021 completed</li>
        <li><span></span>Payment received</li>
        <li><span></span>New support ticket</li>
      </ul>
    </div>

  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="card__header">Latest Users</div>

    <p-table
      [value]="users"
      responsiveLayout="scroll"
      styleClass="lux-table">

      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          <th>Role</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>

          <td>{{user.name}}</td>
          <td class="muted">{{user.email}}</td>

          <td>
            <span class="badge badge--success">
              {{user.status}}
            </span>
          </td>

          <td>{{user.role}}</td>

        </tr>
      </ng-template>

    </p-table>
  </div>

</div>
