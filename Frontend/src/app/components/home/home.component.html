<!-- navigációs sáv -->
<div class="home">
  <nav class="navbar">
    <div class="nav-links">
      <a routerLink="/aboutus">About us</a>
      <a routerLink="/products">Products</a>
      <a routerLink="/profile">Profile</a>
      <a routerLink="/contactus">Contact us</a>
    </div>
  </nav>

  <!-- hero szekció -->
  <section class="hero">
    <h1 class="brand-title">SERVINE</h1>

    <!-- bal oldali tartalom -->
    <div class="hero-left">
      <p>
        Discover the latest trend with us, where you can find anything
        for yourself or your partner. Modern style with a touch of elegance.
      </p>
      <button class="primary-btn">Discover Collections →</button>
    </div>

    <!-- középső kép -->
    <div class="hero-center">
      <img class="womanpng" src="ServineLandingpagewoman.png" alt="Perfume Model">
    </div>

    <!-- jobb oldali slider -->
    <div class="hero-right">
      <button class="arrow-btn" (click)="prev()">←</button>

      <!-- külső keret: ez vágja le a kilógó kártyákat -->
      <div class="slider-viewport">
        <!-- belső sáv: mindig a középső kártya látszik középen -->
        <div class="slider-track">
          <div
            class="card"
            *ngFor="let item of orderedCards; let i = index"
            [class.active]="i === 1"
            [class.side]="i !== 1"
            (click)="i === 0 ? prev() : i === 2 ? next() : null"
          >
            <span class="card-name">{{ item.card.name }}</span>
            <span class="card-sub">{{ item.card.sub }}</span>
          </div>
        </div>
      </div>

      <button class="arrow-btn" (click)="next()">→</button>
    </div>
  </section>
</div>
