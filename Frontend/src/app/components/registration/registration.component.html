<div class="register-page">

  <div class="container-fluid h-100">
    <div class="row h-100 align-items-center justify-content-center">

      <div class="col-lg-10">

        <div class="register-wrapper row">

          <!-- Bal oldal -->
          <div class="col-md-6 register-card">

            <h1 class="register-title">Regisztráció</h1>

            <div class="mt-4">
              <div class="form-floating mb-3">
                <input type="email"  class="form-control w-100 mb-3" id="floatingEmail" placeholder="name@example.com" [(ngModel)]="email">
                <label for="floatingEmail">Email cím</label>
              </div>
              <div class="form-floating mb-3">
                <input type="name"  class="form-control w-100 mb-3" id="floatingName" placeholder="Felhasználónév" [(ngModel)]="name">
                <label for="floatingName">Felhasználónév</label>
              </div>
              <div class="form-floating">
                <input type="password" class="form-control w-100 mb-3" id="floatingPassword" placeholder="Jelszó" [(ngModel)]="password">
                <label for="floatingPassword">Jelszó</label>
              </div>
              <div class="form-floating">
                <input type="confpass" class="form-control w-100 mb-3" id="floatingConfPass" placeholder="Jelszó megerősítése" [(ngModel)]="confpass">
                <label for="floatingConfPass">Jelszó megerősítése</label>
              </div>

              <div class="d-flex justify-content-between small-text">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" [(ngModel)]="TermsAccept">
                  <label class="form-check-label" for="flexCheckDefault">
                    Elfogadom a TOS-t
                  </label>
                </div>
                


              </div>
              <div class="d-flex flex-column">
                <button type="button" class="btn register-btn w-70 mt-4" (click)="registration()">Regisztráció</button>
                <button type="button" class="btn login-btn w-70 mt-3" [routerLink]="['/login']" >Van már fiókja, jelentkezzen be!</button>
              </div>
             
            </div>

          </div>

          <!-- Jobb oldal -->
          <div class="col-md-6 image-panel">

            
            <img src="ServineLandingpagewoman.png" alt="Perfume Model">

          </div>

        </div>

      </div>

    </div>
  </div>

</div>
