<div class="page-wrapper">

  <!-- FEJLÉC -->
  <div class="page-header" @fadeSlide>
    <h1 class="page-title">KOLLEKCIÓ</h1>
    <p class="page-subtitle" *ngIf="!isLoading">{{ filteredProducts.length }} termék</p>
  </div>

  <!-- SZŰRŐ SOR -->
  <div class="filter-bar" @fadeSlide>
    <div class="category-tabs">
      <button
        class="cat-btn"
        [class.active]="selectedCategory === null"
        (click)="setCategory(null)">
        Összes
      </button>
      <button
        class="cat-btn"
        *ngFor="let cat of categories"
        [class.active]="selectedCategory === cat.category_id"
        (click)="setCategory(cat.category_id)">
        {{ cat.name }}
      </button>
    </div>

    <div class="filter-right">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearchChange()"
          placeholder="Keresés..."
          class="search-input" />
      </div>

      <select class="sort-select" [(ngModel)]="sortBy" (ngModelChange)="onSortChange()">
        <option value="default">Sorrend</option>
        <option value="price_asc">Ár: növekvő</option>
        <option value="price_desc">Ár: csökkenő</option>
      </select>
    </div>
  </div>

  <!-- BETÖLTÉS -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
  </div>

  <!-- HIBA -->
  <div class="error-state" *ngIf="errorMessage && !isLoading" @fadeSlide>
    <div class="error-icon">⚠</div>
    <p>{{ errorMessage }}</p>
    <button class="reset-btn" (click)="resetFilters()">Újrapróbálás</button>
  </div>

  <!-- TERMÉKRÁCS -->
  <div class="products-grid"
    *ngIf="!isLoading && !errorMessage && filteredProducts.length > 0">
    <div
      class="product-card"
      *ngFor="let product of filteredProducts"
      [routerLink]="['/products', product.product_id]"
      @fadeSlide>

      <div class="card-image">
        <img
          *ngIf="product.image; else iconPlaceholder"
          [src]="product.image"
          [alt]="product.name"
          class="card-img" />
        <ng-template #iconPlaceholder>
          <div class="card-image-placeholder">
            <span class="card-icon">✦</span>
          </div>
        </ng-template>
        <div class="card-overlay">
          <span class="overlay-text">Részletek →</span>
        </div>
      </div>

      <div class="card-info">
        <div class="card-name">{{ product.name }}</div>
        <div class="card-price">{{ product.price | number:'1.0-0' }} Ft</div>
      </div>
    </div>
  </div>

  <!-- ÜRES ÁLLAPOT -->
  <div class="empty-state"
    *ngIf="!isLoading && !errorMessage && filteredProducts.length === 0"
    @fadeSlide>
    <div class="empty-icon">🔍</div>
    <p class="empty-title">Nem található termék</p>
    <p class="empty-sub">Próbálj más keresési feltételt!</p>
    <button class="reset-btn" (click)="resetFilters()">Szűrők törlése</button>
  </div>

</div>
