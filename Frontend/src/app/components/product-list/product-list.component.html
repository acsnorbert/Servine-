<div class="page-wrapper">
 
  <div class="page-header" @fadeSlide>
    <h1 class="page-title">KOLLEKCIÓ</h1>
    <p class="page-subtitle" *ngIf="!isLoading">{{ filteredProducts.length }} termék</p>
  </div>
 
  <div class="filter-bar" @fadeSlide>
 
    <div class="filter-top-row">
      <div class="category-tabs">
        <button
          class="cat-btn"
          [class.active]="selectedCategory === null"
          (click)="setCategory(null)">
          ÖSSZES
        </button>
        <button
          class="cat-btn"
          *ngFor="let cat of categories"
          [class.active]="selectedCategory === cat.id"
          (click)="setCategory(cat.id!)">
          {{ cat.name }}
        </button>
      </div>
 
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearchChange()"
          placeholder="Keresés..."
          class="search-input" />
      </div>
    </div>
 
    <div class="filter-bottom-row">
      <div class="price-filter">
        <input
          type="number"
          [(ngModel)]="minPrice"
          (ngModelChange)="onAdvancedFilterChange()"
          placeholder="Min ár"
          min="0"
          oninput="validity.valid||(value='');"
          class="price-input" />
        <span class="price-separator">-</span>
        <input
          type="number"
          [(ngModel)]="maxPrice"
          (ngModelChange)="onAdvancedFilterChange()"
          placeholder="Max ár"
          min="0"
          oninput="validity.valid||(value='');"
          class="price-input" />
        <span class="price-currency">Ft</span>
      </div>
 
      <label class="stock-checkbox">
        <input
          type="checkbox"
          [(ngModel)]="inStockOnly"
          (ngModelChange)="onAdvancedFilterChange()" />
        <span class="checkmark"></span>
        Csak raktáron
      </label>
 
      <select class="sort-select" [(ngModel)]="sortBy" (ngModelChange)="onAdvancedFilterChange()">
        <option value="default">Sorrend</option>
        <option value="price_asc">Ár: növekvő</option>
        <option value="price_desc">Ár: csökkenő</option>
      </select>
    </div>
  </div>
 
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
  </div>
 
  <div class="error-state" *ngIf="errorMessage && !isLoading" @fadeSlide>
    <div class="error-icon">⚠</div>
    <p>{{ errorMessage }}</p>
  </div>
 
  <div class="products-grid" *ngIf="!isLoading && !errorMessage && filteredProducts.length > 0">
    <div
      class="product-card"
      *ngFor="let product of paginatedProducts"
      [routerLink]="['/products', product.id]"
      @fadeSlide>
 
      <div class="card-image">
        <img *ngIf="product.image; else iconPlaceholder"
             [src]="product.image"
             [alt]="product.name"
             class="card-img" />
        <ng-template #iconPlaceholder>
          <div class="card-image-placeholder">
            <span class="card-icon">✦</span>
          </div>
        </ng-template>
        <div class="card-overlay">
          <span class="overlay-text">Részletek →</span>
        </div>
      </div>
 
      <div class="card-info">
        <div class="card-name">{{ product.name }}</div>
        <div class="card-price">{{ product.price | number:'1.0-0' }} Ft</div>
      </div>
    </div>
  </div>
 
  <!-- Pagination -->
  <div class="pagination" *ngIf="!isLoading && totalPages > 1" @fadeSlide>
    <button
      class="page-btn page-btn--arrow"
      (click)="goToPage(currentPage - 1)"
      [disabled]="currentPage === 1">
      &#8592;
    </button>
 
    <ng-container *ngFor="let page of pageNumbers">
      <span *ngIf="page < 0" class="page-ellipsis">…</span>
      <button
        *ngIf="page > 0"
        class="page-btn"
        [class.active]="page === currentPage"
        (click)="goToPage(page)">
        {{ page }}
      </button>
    </ng-container>
 
    <button
      class="page-btn page-btn--arrow"
      (click)="goToPage(currentPage + 1)"
      [disabled]="currentPage === totalPages">
      &#8594;
    </button>
  </div>
 
  <!-- Üres állapot -->
  <div class="empty-state"
    *ngIf="!isLoading && !errorMessage && filteredProducts.length === 0"
    @fadeSlide>
    <div class="empty-icon">🔍</div>
    <p class="empty-title">Nem található termék</p>
    <p class="empty-sub">Próbálj más keresési feltételt!</p>
    <button class="reset-btn" (click)="resetFilters()">Szűrők törlése</button>
  </div>
 
</div>
